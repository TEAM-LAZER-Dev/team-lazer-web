<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 – TEAM LAZER</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f; color: #fff;
      font-family: 'Inter', -apple-system, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center; padding: 24px;
    }
    .wrap { max-width: 420px; }
    .code {
      font-family: 'Rajdhani', sans-serif;
      font-size: 6rem; font-weight: 900; line-height: 1;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }
    h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 10px; }
    p { color: rgba(255,255,255,.45); font-size: .92rem; line-height: 1.6; margin-bottom: 28px; }
    a {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 22px; border-radius: 10px;
      background: #7c3aed; color: #fff;
      text-decoration: none; font-size: .88rem; font-weight: 600;
      transition: background .2s;
    }
    a:hover { background: #6d28d9; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Seite nicht gefunden</h1>
    <p>Die angeforderte Seite existiert nicht oder wurde verschoben.</p>
    <a href="/">Zur Startseite</a>
  </div>
</body>
</html>
