[build]
  command = "npm run build"
  publish = "dist"

# ══════════════════════════════════════
# REDIRECTS – Reihenfolge ist wichtig!
# Sensible Pfade zuerst blocken,
# SPA-Fallback ganz am Ende.
# ══════════════════════════════════════

# Dotfiles (.env, .git, .htaccess, .DS_Store)
[[redirects]]
  from = "/.env"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.git/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.htaccess"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.DS_Store"
  to = "/404.html"
  status = 404
  force = true

# CMS / Admin-Panels die nicht existieren
[[redirects]]
  from = "/wp-admin"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/wp-admin/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/wp-login.php"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/phpmyadmin"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/phpmyadmin/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/admin"
  to = "/404.html"
  status = 404
  force = true

# Server-Config-Dateien
[[redirects]]
  from = "/config.php"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/config.*"
  to = "/404.html"
  status = 404
  force = true

# Backups & Datenbanken
[[redirects]]
  from = "/backup.zip"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/db.sql"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/*.sql"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/*.zip"
  to = "/404.html"
  status = 404
  force = true

# API-Docs die nicht existieren
[[redirects]]
  from = "/swagger.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/openapi.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/api/*"
  to = "/404.html"
  status = 404
  force = true

# SPA-Fallback – MUSS ganz am Ende stehen!
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ══════════════════════════════════════
# HEADERS
# ══════════════════════════════════════

# Security Headers (alle Seiten)
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https:; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# Cache: statische Assets (Vite-Hashes)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache: Bilder
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Cache: HTML immer frisch
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
